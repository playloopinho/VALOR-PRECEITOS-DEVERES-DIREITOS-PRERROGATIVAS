<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Simulado - Gestão Marinha 2026</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background:#0b1e3d; margin:0; color:white; padding-bottom: 160px; overflow-x: hidden; }
    
    .header-banner { 
        width: 100%; 
        height: 160px; 
        background: #0b1e3d url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png') no-repeat center; 
        background-size: contain; 
        margin-top: 15px;
        margin-bottom: 10px;
    }

    .container { display: flex; flex-direction: column; align-items: center; padding: 5px; }

    .box { 
        background: #132b52; 
        padding: 15px; 
        border-radius: 12px; 
        width: 92%; 
        max-width: 600px; 
        text-align: center; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.6); 
        border: 1px solid #1c437a; 
    }

    #progress { font-size: 11px; color: #4da6ff; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
    #question-header { margin: 0; color: #ffcc00; font-size: 14px; text-decoration: underline; font-weight: bold; }
    #question-text { margin: 15px 0; font-size: 13px; line-height: 1.5; text-align: left; white-space: pre-wrap; }

    input { 
        width: 100%; 
        box-sizing: border-box;
        padding: 12px; 
        margin-top: 10px; 
        border-radius: 6px; 
        border: 2px solid #4da6ff; 
        background: #071426; 
        color: white; 
        font-size: 15px; 
    }

    .btn-main { 
        margin-top: 15px; 
        padding: 12px; 
        border: none; 
        border-radius: 6px; 
        background: #ffcc00; 
        color: #0b1e3d; 
        font-weight: bold; 
        font-size: 13px;
        text-transform: uppercase; 
        cursor: pointer;
        width: 100%;
    }

    #feedback-area { background: #071426; padding: 12px; margin-top: 15px; border-left: 4px solid #ffcc00; text-align: left; border-radius: 4px; }
    .res-oficial { color: #ffcc00; font-weight: bold; white-space: pre-wrap; display: block; margin-top: 8px; font-size: 12px; line-height: 1.4; }

    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 2px solid #1c437a; padding: 10px 0; z-index: 100; }
    .nav-title { font-size: 10px; text-align: center; color: #4da6ff; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 10px; gap: 8px; }
    .nav-item { flex: 0 0 55px; height: 45px; background: #132b52; border: 2px solid #4da6ff; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 11px; font-weight: bold; }

    /* Estilo do Modal */
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; background: white; color: #0b1e3d; padding: 20px; border-radius: 12px; z-index: 200; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 150; }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">
    <div class="box">
        <div id="progress"></div>
        <h4 id="question-header"></h4>
        <div id="question-text"></div>
        
        <input type="text" id="userInput" placeholder="Escreva sua resposta para treinar...">
        <button class="btn-main" onclick="revealFeedback()">Ver Gabarito</button>
        
        <div id="feedback"></div>
        <button id="nextBtn" class="btn-main" onclick="nextQuestion()" style="display:none; background: #2ecc71; color: white;">Próxima Questão</button>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-title">Consultar Respostas Rápidas</div>
    <div class="scroll-wrapper" id="navBar"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; border-bottom: 2px solid #0b1e3d; padding-bottom: 8px; margin-bottom: 10px;">
        <span id="modal-title" style="font-weight:bold;"></span>
        <span onclick="closeModal()" style="cursor:pointer; font-size: 22px; font-weight:bold;">&times;</span>
    </div>
    <div id="modal-body" style="font-size: 13px; line-height: 1.5; max-height: 350px; overflow-y: auto;"></div>
</div>

<script>
const questions = [
    {id:"1", q:"Quais são os principais componentes de um processo de qualidade na visão de JURAN?", answer:"Planejamento da qualidade, controle da qualidade e aperfeiçoamento da qualidade."},
    {id:"2", q:"Quais são as eras da qualidade?", answer:"Era da inspeção, era do controle estatístico da qualidade, era da garantia da qualidade e era da gestão da qualidade total."},
    {id:"3", q:"Explique a Era da Inspeção.", answer:"Apoia-se em um sistema de medidas, utilizando-se de gabaritos e outros acessórios e de um padrão de referência."},
    {id:"4", q:"Cite os fatores higiênicos segundo HERZBERG.", answer:"Salário, segurança, condições ambientais, bem-estar físico, supervisão e aceitação grupal."},
    {id:"5", q:"Cite os fatores motivacionais segundo HERZBERG.", answer:"Ascensão funcional, trabalho em si, reconhecimento e responsabilidade, liberdade e confiança, desafios profissionais, maior responsabilidade e estímulo a criatividade."},
    {id:"6", q:"Qual a definição oficial de Qualidade?", answer:"A Qualidade é o conjunto das propriedades e características de um produto, processo ou serviço, que lhe fornecem a capacidade de satisfazer as necessidades explícitas ou implícitas."},
    {id:"7", q:"O que é qualidade total?", answer:"É o processo utilizado para garantir o atendimento às necessidades e expectativas dos clientes."},
    {id:"8", q:"O que é custo da qualidade?", answer:"É a expressão usada para indicar dinheiro gasto para prevenir, avaliar e corrigir problemas, desperdícios e falhas de serviços e produtos."},
    {id:"9", q:"O que é processo?", answer:"É um conjunto de causas ou fatores que agindo entre si, promovem a transformação da Matéria-prima ou lhe agregam valor, produzindo um resultado ou efeito desejado."},
    {id:"10", q:"Como os processos podem ser classificados?", answer:"Os processos podem ser classificados como repetitivos e não repetitivos."},
    {id:"11", q:"Quais são as fases básicas do ciclo PDCA?", answer:"Planejar, executar, verificar e agir."},
    {id:"12", q:"O que são indicadores de desempenho?", answer:"São grandezas numéricas que medem atributos de um processo ou de seus resultados, com o objetivo de comparar essas medidas com metas numéricas preestabelecidas."},
    {id:"13", q:"O que é o programa 5S?", answer:"É um programa de reeducação contra o desperdício."},
    {id:"14", q:"O termo 5S é derivado de cinco palavras em japonês, todas iniciadas com a letra S. Cite cada uma delas e suas atribuições.", answer:"SEIRI- Seleção, utilização, arrumação e organização;\nSEITON- Ordenação, sistematização e classificação;\nSEISOU- Limpeza e zelo;\nSEIKETSU- Bem-estar, higiene, asseio, saúde e integridade;\nSHITSUKE Autodisciplina, educação e compromisso."},
    {id:"15", q:"Cite os benefícios do programa 5S.", answer:"Otimização dos espaços, minimização de excessos, consciência dos disperdícios, melhor aproveitamento do tempo e consciência da importância do controle."},
    {id:"16", q:"O que é Brainstorming?", answer:"É uma dinâmica de grupo em que as pessoas, de forma organizada e com oportunidades iguais, fazem um grande esforço mental para opinar sobre determinado assunto."},
    {id:"17", q:"O que é equipe?", answer:"Grupo de pessoas que trabalham juntos com sinergia, com competência e habilidades que se complementam para atingir um objetivo comum."},
    {id:"18", q:"O que é comunicação?", answer:"É a transmissão de qualquer tipo de informação, por qualquer via ou processo."},
    {id:"19", q:"O que é mensagem?", answer:"É o conteúdo ou assunto das informações que são transmitidas."},
    {id:"20", q:"O que é canal de comunicação?", answer:"É o meio pelo qual a mensagem é transmitida."},
    {id:"21", q:"O que é o programa Netuno?", answer:"É um processo administrativo destinado a aprimorar a gestão das Organizações Militares e, consequentemente, proporcionar à Marinha do Brasil as melhores condições para estar pronta e adequada à estatura político estratégica exigida pelo país."},
    {id:"22", q:"A Marinha do Brasil possui em sua estrutura sete órgãos de Direção Setorial. Cite-os.", answer:"Comando de Operações Navais (ComOpNav), Secretaria Geral da Marinha (SGM), Diretoria Geral do Material da Marinha (DGMM), Diretoria Geral do Pessoal da Marinha (DGPM), Diretoria Geral de Navegação (DGN), Diretoria Geral de Desenvolvimento Nuclear e Tecnológico da Marinha (DGDNTM) e o Comando Geral do Corpo de Fuzileiros Navais (CGCFN)."}
];

let current = 0;

function createNavBar() {
    const navBar = document.getElementById("navBar");
    navBar.innerHTML = "";
    questions.forEach((q, idx) => {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerText = "Q" + q.id;
        div.onclick = () => openModal(idx);
        navBar.appendChild(div);
    });
}

function show(){
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("userInput").value="";
    
    let q = questions[current];
    document.getElementById("question-header").innerText = "QUESTÃO " + q.id;
    document.getElementById("question-text").innerText = q.q;
    document.getElementById("progress").innerText = "SIMULADO GESTÃO: " + (current+1) + " / " + questions.length;
}

function revealFeedback() {
    let q = questions[current];
    document.getElementById("feedback").innerHTML = `
        <div id="feedback-area">
            <strong>GABARITO:</strong>
            <span class="res-oficial">${q.answer.replace(/\n/g, '<br>')}</span>
        </div>
    `;
    document.getElementById("nextBtn").style.display="block";
}

function nextQuestion(){ 
    current++; 
    if(current >= questions.length) current = 0;
    show(); 
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "RESPOSTA Q" + q.id;
    document.getElementById("modal-body").innerHTML = `
        <strong>${q.q}</strong><br><br>
        <span style="color:#2980b9; font-weight:bold;">R: ${q.answer.replace(/\n/g, '<br>')}</span>
    `;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

createNavBar();
show();
</script>
</body>
</html>
