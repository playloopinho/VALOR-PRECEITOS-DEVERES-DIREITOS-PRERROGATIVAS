<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Gestão 2026 - Master</title>
<style>
    :root {
        --primary: #0b1e3d;
        --secondary: #132b52;
        --accent: #ffcc00;
        --text: #ffffff;
        --success: #2ecc71;
        --error: #e74c3c;
    }

    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary); margin:0; color: var(--text); padding-bottom: 160px; overflow-x: hidden; font-size: 13px; }
    
    .header-banner { 
        width: 100%; 
        height: 80px; 
        background: var(--primary) url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png') no-repeat center; 
        background-size: contain; 
        margin: 5px 0;
    }

    .container { display: flex; flex-direction: column; align-items: center; padding: 5px; }

    .box { 
        background: var(--secondary); 
        padding: 15px; 
        border-radius: 12px; 
        width: 92%; 
        max-width: 600px; 
        text-align: center; 
        box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
        border: 1px solid #1c437a; 
    }

    #progress-container { width: 100%; background: #071426; border-radius: 8px; height: 8px; margin-bottom: 10px; overflow: hidden; border: 1px solid #1c437a; }
    #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; }

    #info-row { display: flex; justify-content: space-between; font-size: 10px; color: #4da6ff; font-weight: bold; margin-bottom: 8px; }
    
    #question-header { margin: 0; color: var(--accent); font-size: 14px; text-transform: uppercase; }
    #question-text { margin: 10px 0; font-size: 13px; line-height: 1.5; text-align: left; border-left: 3px solid var(--accent); padding-left: 12px; min-height: 40px; }

    textarea { 
        width: 100%; 
        box-sizing: border-box;
        padding: 10px; 
        border-radius: 6px; 
        border: 2px solid #1c437a; 
        background: #071426; 
        color: white; 
        font-size: 12px; 
        resize: none;
        font-family: inherit;
    }

    .btn-main { margin-top: 8px; padding: 10px; border: none; border-radius: 6px; background: var(--accent); color: var(--primary); font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 12px; }
    
    #hint-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 6px; padding: 6px; font-size: 10px; width: auto; min-width: 130px; cursor: pointer; border-radius: 4px; }

    #hint-box { 
        background: rgba(255, 204, 0, 0.05); 
        border-radius: 6px; 
        padding: 8px; 
        margin-top: 8px; 
        font-size: 11px; 
        color: #ffcc00; 
        display: none; 
        text-align: left;
        border: 1px dashed rgba(255, 204, 0, 0.3);
    }

    .hint-item { margin-bottom: 3px; display: flex; align-items: center; }
    .hint-item::before { content: '🔑'; margin-right: 6px; font-size: 9px; }

    #feedback-area { background: #071426; padding: 12px; margin-top: 10px; border-radius: 6px; text-align: left; display: none; }
    .res-oficial { color: var(--accent); font-weight: 600; display: block; margin-top: 5px; font-size: 12px; line-height: 1.4; }

    /* Footer Navigation */
    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 2px solid #1c437a; padding: 8px 0; z-index: 100; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 10px; gap: 6px; scrollbar-width: none; margin-bottom: 8px; }
    .nav-item { flex: 0 0 40px; height: 40px; background: var(--secondary); border: 1px solid #1c437a; border-radius: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #4da6ff; }

    .action-bar { display: flex; justify-content: space-between; padding: 0 10px; gap: 8px; }
    .btn-action { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; }
    .btn-reset { background: var(--error); color: white; }
    .btn-finish { background: var(--success); color: white; }

    /* Modal */
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; background: white; color: var(--primary); padding: 20px; border-radius: 12px; z-index: 200; box-shadow: 0 0 35px rgba(0,0,0,0.8); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 150; backdrop-filter: blur(2px); }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">
    <div class="box">
        <div id="info-row">
            <span id="counter">ESTUDANDO...</span>
            <span id="score">ACERTOS: 0</span>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        
        <h4 id="question-header">QUESTÃO</h4>
        <div id="question-text">...</div>
        
        <div id="quiz-controls">
            <textarea id="userInput" rows="3" placeholder="Sua resposta..."></textarea>
            <button id="hint-btn" onclick="giveHint()">💡 PALAVRA-CHAVE (0/5)</button>
            <div id="hint-box"></div>
            <button class="btn-main" onclick="checkAnswer()">Validar Resposta</button>
        </div>
        
        <div id="feedback-area">
            <strong id="status-label" style="font-size: 11px;">GABARITO:</strong>
            <span class="res-oficial" id="correct-answer"></span>
            <button class="btn-main" onclick="confirmNext()" style="background: var(--success); color: white;">Próxima Questão</button>
        </div>
    </div>
</div>

<div class="footer-nav">
    <div class="scroll-wrapper" id="navBar"></div>
    <div class="action-bar">
        <button class="btn-action btn-reset" onclick="resetSimulated()">RESETAR</button>
        <button class="btn-action btn-finish" onclick="finishSimulated()">CONCLUIR</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; border-bottom: 2px solid var(--primary); padding-bottom: 8px; margin-bottom: 12px;">
        <span id="modal-title" style="font-weight:bold; font-size: 13px;"></span>
        <span onclick="closeModal()" style="cursor:pointer; font-size: 18px;">&times;</span>
    </div>
    <div id="modal-body" style="font-size: 12px; line-height: 1.5; color: #333;"></div>
</div>

<script>
// Dados das questões mantidos conforme solicitado
const questions = [
    {id:"1", q:"Quais são os principais componentes de um processo de qualidade na visão de JURAN?", answer:"Planejamento da qualidade, controle da qualidade e aperfeiçoamento da qualidade.", keys:["Planejamento", "Controle", "Aperfeiçoamento", "Processo", "Qualidade"]},
    {id:"2", q:"Quais são as eras da qualidade?", answer:"Era da inspeção, era do controle estatístico da qualidade, era da garantia da qualidade e era da gestão da qualidade total.", keys:["Inspeção", "Controle Estatístico", "Garantia", "Gestão Total", "Eras"]},
    {id:"3", q:"Explique a Era da Inspeção.", answer:"Apoia-se em um sistema de medidas, utilizando-se de gabaritos e outros acessórios e de um padrão de referência.", keys:["medidas", "Gabaritos", "Acessórios", "Padrão", "Referência"]},
    {id:"4", q:"Cite os fatores higiênicos segundo HERZBERG.", answer:"Salário, segurança, condições ambientais, bem-estar físico, supervisão e aceitação grupal.", keys:["Salário", "Segurança", "Ambientais", "Supervisão", "Aceitação"]},
    {id:"5", q:"Cite os fatores motivacionais segundo HERZBERG.", answer:"Ascensão funcional, trabalho em si, reconhecimento e responsabilidade, liberdade e confiança, desafios profissionais, maior responsabilidade e estímulo a criatividade.", keys:["Ascensão", "Reconhecimento", "Responsabilidade", "Desafios", "Criatividade"]},
    {id:"6", q:"Qual a definição oficial de Qualidade?", answer:"A Qualidade é o conjunto das propriedades e características de um produto, processo ou serviço, que lhe fornecem a capacidade de satisfazer as necessidades explícitas ou implícitas.", keys:["Propriedades", "Características", "Satisfazer", "Necessidades", "Implícitas"]},
    {id:"7", q:"O que é qualidade total?", answer:"É o processo utilizado para garantir o atendimento às necessidades e expectativas dos clientes.", keys:["Processo", "Atendimento", "Needs", "Expectativas", "Clientes"]},
    {id:"8", q:"O que é custo da qualidade?", answer:"É a expressão usada para indicar dinheiro gasto para prevenir, avaliar e corrigir problemas, desperdícios e falhas de serviços e produtos.", keys:["Dinheiro", "Prevenir", "Corrigir", "Desperdícios", "Falhas"]},
    {id:"9", q:"O que é processo?", answer:"É um conjunto de causas ou fatores que agindo entre si, promovem a transformação da Matéria-prima ou lhe agregam valor, produzindo um resultado ou efeito desejado.", keys:["Causas", "Fatores", "Transformação", "Matéria-prima", "Valor"]},
    {id:"10", q:"Como os processos podem ser classificados?", answer:"Os processos podem ser classificados como repetitivos e não repetitivos.", keys:["Classificados", "Repetitivos", "Não repetitivos", "Processos", "Categorias"]},
    {id:"11", q:"Quais são as fases básicas do ciclo PDCA?", answer:"Planejar, executar, verificar e agir.", keys:["Planejar", "Executar", "Verificar", "Agir", "Ciclo"]},
    {id:"12", q:"O que são indicadores de desempenho?", answer:"São grandezas numéricas que medem atributos de um processo ou de seus resultados, com o objetivo de comparar essas medidas com metas numéricas preestabelecidas.", keys:["Grandezas", "Numéricas", "Atributos", "Metas", "Comparar"]},
    {id:"13", q:"O que é o programa 5S?", answer:"É um programa de reeducação contra o desperdício.", keys:["Programa", "Reeducação", "Contra", "Desperdício", "Hábito"]},
    {id:"14", q:"O termo 5S é derivado de cinco palavras em japonês. Cite cada uma delas e suas atribuições.", answer:"SEIRI (Seleção), SEITON (Ordenação), SEISOU (Limpeza), SEIKETSU (Higiene) e SHITSUKE (Autodisciplina).", keys:["SEIRI", "SEITON", "SEISOU", "SEIKETSU", "SHITSUKE"]},
    {id:"15", q:"Cite os benefícios do programa 5S.", answer:"Otimização dos espaços, minimização de excessos, consciência dos disperdícios, melhor aproveitamento do tempo e consciência da importância do controle.", keys:["Espaços", "Excessos", "Desperdícios", "Tempo", "Controle"]},
    {id:"16", q:"O que é Brainstorming?", answer:"É uma dinâmica de grupo em que as pessoas, de forma organizada e com oportunidades iguais, fazem um grande esforço mental para opinar sobre determinado assunto.", keys:["Dinâmica", "Grupo", "Organizada", "Esforço Mental", "Opinar"]},
    {id:"17", q:"O que é equipe?", answer:"Grupo de pessoas que trabalham juntos com sinergia, com competência e habilidades que se complementam para atingir um objetivo comum.", keys:["Sinergia", "Competência", "Habilidades", "Complementam", "Objetivo Comum"]},
    {id:"18", q:"O que é comunicação?", answer:"É a transmissão de qualquer tipo de informação, por qualquer via ou processo.", keys:["Transmissão", "Informação", "Via", "Processo", "Comunicação"]},
    {id:"19", q:"O que é mensagem?", answer:"É o conteúdo ou assunto das informações que são transmitidas.", keys:["Conteúdo", "Assunto", "Informações", "Transmitidas", "Mensagem"]},
    {id:"20", q:"O que é canal de comunicação?", answer:"É o meio pelo qual a mensagem é transmitida.", keys:["Meio", "Mensagem", "Transmitida", "Canal", "Comunicação"]},
    {id:"21", q:"O que é o programa Netuno?", answer:"É um processo administrativo destinado a aprimorar a gestão das Organizações Militares.", keys:["Processo", "Administrativo", "Aprimorar", "Gestão", "OMs"]},
    {id:"22", q:"A Marinha do Brasil possui sete órgãos de Direção Setorial. Cite-os.", answer:"ComOpNav, SGM, DGMM, DGPM, DGN, DGDNTM e CGCFN.", keys:["ComOpNav", "SGM", "DGMM", "DGPM", "CGCFN"]}
];

let shuffled = [];
let currentIndex = 0;
let answeredCount = 0;
let correctCount = 0;
let hintLevel = 0;

function init() {
    createNavBar();
    const savedIdx = localStorage.getItem('gestao_idx');
    const savedAns = localStorage.getItem('gestao_ans');
    const savedCor = localStorage.getItem('gestao_cor');
    
    if(savedIdx) currentIndex = parseInt(savedIdx);
    if(savedAns) answeredCount = parseInt(savedAns);
    if(savedCor) correctCount = parseInt(savedCor);

    let savedOrder = localStorage.getItem('gestao_order');
    if(savedOrder) {
        let indices = JSON.parse(savedOrder);
        shuffled = indices.map(i => questions.find(q => q.id == i));
    } else {
        shuffled = [...questions].sort(() => 0.5 - Math.random());
        localStorage.setItem('gestao_order', JSON.stringify(shuffled.map(q => q.id)));
    }
    updateDisplay();
}

function createNavBar() {
    const navBar = document.getElementById("navBar");
    navBar.innerHTML = "";
    questions.forEach((q, idx) => {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerText = q.id;
        div.onclick = () => openModal(idx);
        navBar.appendChild(div);
    });
}

function updateDisplay() {
    if(currentIndex >= shuffled.length) {
        finishSimulated();
        return;
    }
    hintLevel = 0;
    document.getElementById("hint-box").style.display = "none";
    document.getElementById("hint-box").innerHTML = "";
    document.getElementById("hint-btn").innerText = "💡 PALAVRA-CHAVE (0/5)";
    
    let q = shuffled[currentIndex];
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("quiz-controls").style.display = "block";
    document.getElementById("userInput").value = "";
    document.getElementById("question-header").innerText = "QUESTÃO " + q.id;
    document.getElementById("question-text").innerText = q.q;
    document.getElementById("counter").innerText = `QUESTÃO ${answeredCount + 1}/${questions.length}`;
    document.getElementById("score").innerText = "ACERTOS: " + correctCount;
    document.getElementById("progress-bar").style.width = (answeredCount / questions.length * 100) + "%";
}

function giveHint() {
    if (hintLevel >= 5) return;
    const q = shuffled[currentIndex];
    const hintBox = document.getElementById("hint-box");
    hintBox.style.display = "block";
    let keyword = q.keys[hintLevel] || q.keys[0]; 
    hintLevel++;
    document.getElementById("hint-btn").innerText = `💡 PALAVRA-CHAVE (${hintLevel}/5)`;
    const div = document.createElement("div");
    div.className = "hint-item";
    div.innerHTML = `<strong>Dica ${hintLevel}:</strong> ${keyword}`;
    hintBox.appendChild(div);
}

function checkAnswer() {
    let q = shuffled[currentIndex];
    let userVal = document.getElementById("userInput").value.toLowerCase();
    let matches = q.keys.filter(k => userVal.includes(k.toLowerCase()));
    document.getElementById("quiz-controls").style.display = "none";
    document.getElementById("feedback-area").style.display = "block";
    document.getElementById("correct-answer").innerText = q.answer;

    if(matches.length >= 2 || (userVal.length > 15 && matches.length >= 1)) {
        document.getElementById("status-label").innerText = "CORRETO! GABARITO:";
        document.getElementById("status-label").style.color = "var(--success)";
        correctCount++;
    } else {
        document.getElementById("status-label").innerText = "GABARITO OFICIAL:";
        document.getElementById("status-label").style.color = "var(--accent)";
    }
}

function confirmNext() {
    answeredCount++;
    currentIndex++;
    localStorage.setItem('gestao_idx', currentIndex);
    localStorage.setItem('gestao_ans', answeredCount);
    localStorage.setItem('gestao_cor', correctCount);
    updateDisplay();
}

function finishSimulated() {
    const total = answeredCount;
    const acertos = correctCount;
    const erros = total - acertos;
    const perc = total > 0 ? ((acertos / total) * 100).toFixed(1) : 0;

    document.getElementById("modal-title").innerText = "RESUMO DO SIMULADO";
    document.getElementById("modal-body").innerHTML = `
        <div style="text-align:center;">
            <p><strong>Questões:</strong> ${total}</p>
            <p style="color:var(--success)"><strong>Acertos:</strong> ${acertos}</p>
            <p style="color:var(--error)"><strong>Erros:</strong> ${erros}</p>
            <h3 style="color:var(--primary); margin: 10px 0;">Aproveitamento: ${perc}%</h3>
            <button class="btn-main" onclick="resetSimulated()" style="margin-top:10px;">REINICIAR TUDO</button>
        </div>
    `;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function resetSimulated() {
    if(confirm("Deseja apagar o progresso e reiniciar?")) {
        localStorage.clear();
        location.reload();
    }
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "GABARITO - Q" + q.id;
    document.getElementById("modal-body").innerHTML = `
        <p><strong>${q.q}</strong></p>
        <div style="background:#fff3e0; padding:12px; border-radius:8px; border-left:4px solid #ff9800; color:#444;">
            ${q.answer}
        </div>
    `;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

init();
</script>
</body>
</html>
