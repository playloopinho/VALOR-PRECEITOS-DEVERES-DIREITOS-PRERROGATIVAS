<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administração Naval - Completo Oficial</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0b1e3d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.container{
    width:95%;
    max-width:800px;
    text-align:center;
}

.box{
    background:#132b52;
    padding:20px;
    border-radius:10px;
}

.option{
    background:#4da6ff;
    color:black;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.option:hover{opacity:0.85;}

.correct{
    background:green !important;
    color:white;
}

.wrong{
    background:red !important;
    color:white;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<div class="box">
<div id="progress"></div>
<h3 id="question"></h3>
<div id="options"></div>
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima</button>
<h3 id="result"></h3>
</div>
</div>

<script>

const questions = [

/* ================= 26 QUESTÕES ORIGINAIS ================= */

a:["Declaração de Dependente (DD)","Portaria Administrativa","Ficha Militar","Termo de Registro"],correct:0},

{q:"Órgão de Direção Setorial relacionado à economia e administração naval?",
a:["Secretaria-Geral da Marinha (SGM)","Comando Naval","Diretoria Militar","Conselho Administrativo"],correct:0},

{q:"Documento que registra anexação à Sindicância?",
a:["Juntada","Autuação","IPM","Portaria"],correct:0},

{q:"Termo inicial da Sindicância?",
a:["Autuação","Juntada","Relatório","Depoimento"],correct:0},

{q:"Promoção baseada no conjunto de qualidades e atributos que distinguem a praça?",
a:["Promoção por merecimento","Promoção automática","Promoção especial","Promoção administrativa"],correct:0},

{q:"Promoção baseada na precedência hierárquica?",
a:["Promoção por antiguidade","Promoção por bravura","Promoção post-mortem","Promoção especial"],correct:0},

{q:"Promoção que resulta de ato incomum de coragem e audácia?",
a:["Promoção por bravura","Promoção por antiguidade","Promoção por tempo","Promoção administrativa"],correct:0},

{q:"Promoção concedida após falecimento em serviço?",
a:["Promoção post-mortem","Promoção honorária","Promoção administrativa","Promoção automática"],correct:0},

{q:"Procedimento administrativo sumário de apuração preliminar?",
a:["Sindicância","IPM","Conselho de Disciplina","Auditoria"],correct:0},

{q:"Procedimento destinado à apuração de crimes militares?",
a:["Inquérito Policial Militar (IPM)","Sindicância","Processo Civil","Portaria"],correct:0},

{q:"Estágio realizado após cursos com duração de um ano?",
a:["Estágio de Aplicação","Estágio Inicial","Estágio Extra","Estágio Especial"],correct:0},

{q:"Crime caracterizado por ausência superior a oito dias?",
a:["Deserção","Indisciplina","Contravenção","Abandono"],correct:0},

{q:"Promoção após reconhecimento de direito não efetivado?",
a:["Promoção em ressarcimento de preterição","Promoção especial","Promoção automática","Promoção administrativa"],correct:0},

{q:"Documento que formaliza o compromisso legal do escrivão?",
a:["Termo de Compromisso","Portaria","Autuação","Juntada"],correct:0},

{q:"Conceito de Contravenção Disciplinar?",
a:["Ação ou omissão contrária às obrigações militares que não constitua crime","Crime militar","Advertência formal","Suspensão administrativa"],correct:0},

{q:"Principal missão da guarda a presos?",
a:["Manter controle e custódia","Aplicar pena","Julgar o preso","Interrogar o preso"],correct:0},

{q:"Compromissos de tempo de serviço são classificados como:",
a:["Inicial, prorrogações e cursos","Apenas inicial","Apenas cursos","Apenas prorrogação"],correct:0},

{q:"Não se deve usar a Bandeira Nacional como:",
a:["Reposteiro ou pano de boca","Símbolo oficial","Elemento de honra","Cerimônia pública"],correct:0},

{q:"Circunstância atenuante disciplinar:",
a:["Bons antecedentes militares","Reincidência","Crime militar","Deserção"],correct:0},

{q:"Quando pode tocar no preso?",
a:["Em legítima defesa ou para evitar fuga","Sempre","Nunca","Somente por ordem verbal"],correct:0},

{q:"Dever das Praças:",
a:["Cumprir instruções e executar o serviço","Recusar ordens","Evitar exercícios","Dispensar tarefas"],correct:0},

/* ================= 17 DO PDF — TEXTO LITERAL ================= */

{q:"São deveres específicos de todas as Praças da Marinha, EXCETO?",
a:[
"Cumprir as instruções que tiverem para o serviço.",
"Executar tarefas necessárias à manutenção.",
"Tomar parte nas mostras, fainas e exercícios.",
"Participar dos exercícios de cultura física e desportos."
],correct:3},

{q:"Qual das alternativas abaixo NÃO é considerada Licença?",
a:[
"Licença para frequentar curso de formação pessoal (LECEP).",
"Licença à adotante (LA).",
"Licença paternidade (LP).",
"Licença para tratamento de saúde de pessoa da família (LTSPE)."
],correct:0},

{q:"Qual é o documento utilizado para registro de dependentes segundo o PDF?",
a:[
"Declaração de Dependente (RD).",
"Declaração de Beneficiário Anual (DBA).",
"Declaração de Beneficiário Inicial (DBI).",
"Declaração de Dependente Inicial (RBI)."
],correct:0},

{q:"Qual é uma circunstância atenuante da contravenção disciplinar?",
a:[
"Legítima defesa própria ou de outrem.",
"Ter sido cometida estando em risco a OM.",
"Rigor não autorizado.",
"Reincidência."
],correct:0},

{q:"Qual NÃO caracteriza Crime de Deserção?",
a:[
"Evadir-se do poder de escolta.",
"Ausentar-se por mais de oito dias.",
"Não se apresentar findo prazo de férias.",
"Não se apresentar após cassação de licença."
],correct:0},

{q:"Procedimento administrativo sumário preparatório de mera apuração preliminar?",
a:[
"Sindicância.",
"Inquérito Policial Militar.",
"Processo Administrativo.",
"Auto de Prisão em Flagrante."
],correct:0},

{q:"Órgão de assistência direta e imediata do Ministério da Defesa?",
a:[
"Assessoria Especial Militar.",
"Hospital das Forças Armadas.",
"Escola Superior de Guerra.",
"Departamento Calha Norte."
],correct:0},

{q:"Termo inicial da Sindicância subscrito pelo escrivão?",
a:[
"Autuação.",
"Relatório.",
"Despacho.",
"Juntada."
],correct:0},

{q:"Procedimento que apura fatos que possam constituir crimes militares?",
a:[
"Inquérito Policial Militar (IPM).",
"Sindicância.",
"Auditoria Militar.",
"Processo Civil."
],correct:0},

{q:"Compromissos de tempo de serviço são classificados como:",
a:[
"Compromisso inicial; prorrogações; cursos ou estágios.",
"Apenas inicial.",
"Apenas cursos.",
"Apenas prorrogação."
],correct:0},

{q:"Escrivão designado na ausência é chamado:",
a:[
"Escrivão ad hoc.",
"Oficial Auxiliar.",
"Relator.",
"Secretário."
],correct:0},

{q:"O ofendido na sindicância é ouvido em:",
a:[
"Termo de Inquirição.",
"Relatório.",
"Auto.",
"Despacho."
],correct:0}

];

let shuffled=[];
let current=0;
let score=0;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function start(){
shuffled=[...questions];
shuffle(shuffled);
current=0;
score=0;
show();
}

function show(){
document.getElementById("progress").innerText="Questão "+(current+1)+" de "+shuffled.length;
let q=shuffled[current];
document.getElementById("question").innerText=q.q;

let optDiv=document.getElementById("options");
optDiv.innerHTML="";
let answers=[...q.a];
shuffle(answers);

answers.forEach(ans=>{
let div=document.createElement("div");
div.className="option";
div.innerText=ans;
div.onclick=()=>select(div,ans,q.a[q.correct]);
optDiv.appendChild(div);
});
}

function select(el,sel,cor){
let opts=document.querySelectorAll(".option");
opts.forEach(o=>o.onclick=null);

if(sel===cor){
el.classList.add("correct");
score++;
}else{
el.classList.add("wrong");
opts.forEach(o=>{if(o.innerText===cor){o.classList.add("correct");}});
}

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
current++;
if(current<shuffled.length){
document.getElementById("nextBtn").style.display="none";
show();
}else{
let percent=Math.round((score/shuffled.length)*100);
document.getElementById("question").innerText="SIMULADO FINALIZADO";
document.getElementById("options").innerHTML="";
document.getElementById("progress").innerText="";
document.getElementById("result").innerText=
"Resultado: "+score+" de "+shuffled.length+" | "+percent+"%";
document.getElementById("nextBtn").style.display="none";
}
}

start();

</script>
</body>
</html>
