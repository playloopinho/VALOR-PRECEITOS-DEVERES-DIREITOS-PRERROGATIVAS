<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Oficial - Administração Naval</title>
<style>
    /* COR DE FUNDO ÚNICA EM TODO O APP */
    body { font-family: 'Segoe UI', sans-serif; background:#0b1e3d; margin:0; color:white; padding-bottom: 120px; }
    
    /* BANNER NO TOPO - SEM LINHA AMARELA */
    .header-banner {
        width: 100%;
        height: 180px;
        background-color: #0b1e3d;
        background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png'); 
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 10px;
        padding: 20px 0;
    }

    .container { display:flex; justify-content:center; align-items:center; padding: 10px; }
    
    /* CAIXA DE QUESTÕES - AZUL UM POUCO MAIS CLARO PARA DAR PROFUNDIDADE */
    .box { background:#132b52; padding:25px; border-radius:12px; width:100%; max-width:800px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #1c437a; }
    
    .option { background:#4da6ff; color:black; padding:12px; margin:10px 0; border-radius:8px; cursor:pointer; font-weight:bold; text-align: left; transition: 0.2s; }
    .option:hover { background: #80bfff; }
    .correct { background:green !important; color:white; }
    .wrong { background:red !important; color:white; }
    
    input { width:90%; padding:12px; margin-top:15px; border-radius: 5px; border: 2px solid #4da6ff; background: #0b1e3d; color: white; font-size: 16px; }
    
    /* BOTÃO PRINCIPAL */
    button { margin-top:15px; padding:12px 25px; border:none; border-radius:5px; cursor:pointer; background: #4da6ff; color: #0b1e3d; font-weight: bold; text-transform: uppercase; }

    #feedback-area { background: #071426; padding: 15px; margin-top: 15px; border-left: 5px solid #4da6ff; text-align: left; font-size: 14px; }

    /* BARRA DE CONSULTA INFERIOR - SEM LINHA AMARELA */
    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 1px solid #1c437a; padding: 12px 0; z-index: 100; }
    .nav-title { font-size: 11px; text-align: center; color: #4da6ff; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 15px; gap: 8px; }
    .nav-item { flex: 0 0 40px; height: 40px; background: #132b52; border: 1px solid #4da6ff; border-radius: 4px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 14px; color: white; }

    /* MODAL DE CONSULTA */
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 450px; background: white; color: black; padding: 20px; border-radius: 10px; z-index: 200; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">
    <div class="box" id="mainBox">
        <div id="progress" style="font-size: 12px; color: #4da6ff; margin-bottom: 10px;"></div>
        <h3 id="question" style="margin-top: 0; min-height: 60px;"></h3>
        <div id="options"></div>
        <div id="discursive"></div>
        <div id="feedback"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima Questão</button>
        <h3 id="result"></h3>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-title">CENTRAL DE CONSULTA (1 - 43)</div>
    <div class="scroll-wrapper" id="navBar"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 10px; padding-bottom: 5px;">
        <span id="modal-title"></span>
        <span style="cursor:pointer" onclick="closeModal()">X</span>
    </div>
    <div id="modal-body" style="font-size: 14px; max-height: 300px; overflow-y: auto;"></div>
</div>

<script>
const questions = [
    {q:"Documento para registro de dependentes junto à DPMM e CPesFN?", a:["Declaração de Dependente (DD)","Ficha de Cadastro","RBI","Averbação"], correct:0, type:"mc"},
    {q:"Órgão Setorial que contribui para o preparo do Poder Naval em economia e finanças:", a:["Secretaria-Geral da Marinha (SGM)","EMA","DPC","CGCFN"], correct:0, type:"mc"},
    {q:"Deveres específicos de todas as Praças da Marinha:", answer:"a) Cumprir instruções; b) Tomar parte nas mostras, fainas e exercícios; c) Desempenhar tarefas determinadas; d) Participar de cultura física.", type:"text"},
    {q:"Atenuantes da contravenção disciplinar:", answer:"Bons antecedentes; Idade < 18; Tempo < 6 meses; Serviços relevantes; Rigor não autorizado; Provocação.", type:"text"},
    {q:"Qual das alternativas não é considerada uma Licença?", a:["LECEP","LAC","LA","LTSPF"], correct:0, type:"mc"},
    {q:"Conceitue Contravenção Disciplinar.", answer:"Ação ou omissão contrária às obrigações ou deveres militares que não constitua crime.", type:"text"},
    {q:"Procedimento para apuração de crimes militares (Art. 9º CPM):", answer:"Inquérito Policial Militar (IPM).", type:"text"},
    {q:"Como são classificados os compromissos de tempo de serviço?", answer:"Inicial; Decorrentes de prorrogações; e de cursos ou estágios.", type:"text"},
    {q:"Termo inicial da Sindicância subscrito pelo escrivão:", a:["Autuação","Juntada","Relatório","Capa"], correct:0, type:"mc"},
    {q:"Termo que registra a anexação de papéis que interessam à prova:", a:["Juntada","Autuação","Despacho","Certidão"], correct:0, type:"mc"},
    {q:"O que o escrivão promete no Termo de Compromisso?", answer:"Manter sigilo dos autos e cumprir fielmente as normas.", type:"text"},
    {q:"Finalidade da Sindicância:", answer:"Apuração sumária de irregularidades ou atos que exijam esclarecimento.", type:"text"},
    {q:"Formas de promoção para Praças:", answer:"Antiguidade, Merecimento, Bravura, Post-mortem e Ressarcimento de Preterição.", type:"text"},
    {q:"Definição de Promoção por Merecimento:", answer:"Conjunto de qualidades e atributos que distinguem o valor da praça.", type:"text"},
    {q:"Definição de Promoção por Antiguidade:", answer:"Precedência hierárquica de uma praça sobre as demais.", type:"text"},
    {q:"O que é Promoção por Bravura?", answer:"Ato de coragem e audácia incomuns que ultrapassam os limites do dever.", type:"text"},
    {q:"O que é Promoção Post-Mortem?", answer:"Reconhecimento da Pátria à praça falecida no cumprimento do dever.", type:"text"},
    {q:"Promoção em Ressarcimento de Preterição:", answer:"Reconhecimento do direito à promoção que lhe caberia anteriormente.", type:"text"},
    {q:"Prazo para deserção (ausência sem licença):", a:["Mais de 8 dias","8 dias","10 dias","24 horas"], correct:0, type:"mc"},
    {q:"Data da Parte de Deserção para ausência iniciada em 05/03/24:", answer:"15 de março de 2024.", type:"text"},
    {q:"Missão principal do serviço de guarda a presos:", answer:"Mantê-lo sob controle e custódia.", type:"text"},
    {q:"Conduta da escolta ao entrar em prédios:", answer:"O escolta deve entrar à frente, mantendo o controle da situação.", type:"text"},
    {q:"Onde se posiciona o SP ao escoltar o preso em deslocamento?", answer:"À retaguarda e lateralmente, mantendo distância de segurança.", type:"text"},
    {q:"Proibições quanto ao uso da Bandeira Nacional:", answer:"Não usar como reposteiro, pano de boca, guarnição de mesa ou revestimento de tribuna.", type:"text"},
    {q:"Idade considerada atenuante na contravenção:", a:["Menor de 18 anos","Menor de 21 anos","Menor de 16 anos","Indiferente"], correct:0, type:"mc"},
    {q:"Designa o escrivão ad hoc na falta de oficiais/sargentos:", a:["Encarregado da Sindicância","Comandante","Ministro","Imediato"], correct:0, type:"mc"},
    {q:"Dever das Praças: Executar tarefas de manutenção?", a:["Sim, é dever específico","Não, apenas oficiais","Opcional","Apenas no mar"], correct:0, type:"mc"},
    {q:"Qual licença para tratamento de saúde de pessoa da família?", a:["LTSPF","LAC","LA","LP"], correct:0, type:"mc"},
    {q:"Escrivão designado por pessoa idônea na falta de militares:", answer:"Escrivão ad hoc.", type:"text"},
    {q:"Órgão de assistência direta ao Ministério da Defesa:", a:["Assessoria Especial Militar","HFA","ESG","Calha Norte"], correct:0, type:"mc"},
    {q:"Tempo do Estágio de Aplicação das Praças:", a:["Um ano","Seis meses","Dois anos","Três meses"], correct:0, type:"mc"},
    {q:"Quem é ouvido no Termo de Depoimento?", answer:"Testemunhas.", type:"text"},
    {q:"Quem é ouvido no Termo de Declaração?", answer:"Ofendido.", type:"text"},
    {q:"Atenuante: Tempo de serviço militar menor de...", a:["Seis meses","Um ano","Dois anos","Três meses"], correct:0, type:"mc"},
    {q:"O que o SP observa no preso no tribunal para segurança?", answer:"Evitar que ele se fira com objetos ou tente fuga.", type:"text"},
    {q:"Uso da Bandeira Nacional em mau estado:", a:["É proibido","Permitido se urgente","Livre","Apenas em treino"], correct:0, type:"mc"},
    {q:"Pode colocar emblemas sobre a Bandeira?", a:["Não, é proibido","Sim, da OM","Apenas o Brasão","Sim"], correct:0, type:"mc"},
    {q:"Frequência das prorrogações de tempo de serviço:", answer:"Variável, conforme compromissos assumidos.", type:"text"},
    {q:"O que deve constar na Autuação da Sindicância?", answer:"Portaria, anexos e Termo de Compromisso.", type:"text"},
    {q:"Bons antecedentes são considerados atenuantes?", a:["Sim","Não","Depende do crime","Apenas para oficiais"], correct:0, type:"mc"},
    {q:"Na audiência, onde o escolta se posiciona?", a:["À esquerda e um pouco atrás do preso","À frente","Longe","Sentado"], correct:0, type:"mc"},
    {q:"Pode abater a Bandeira Nacional em continência?", a:["Não, é proibido","Sim","Às vezes","No pôr do sol"], correct:0, type:"mc"},
    {q:"Dever: Tomar parte nas mostras, fainas e exercícios?", a:["Sim","Não","Só mostras","Só fainas"], correct:0, type:"mc"}
];

let shuffled=[]; let current=0; let score=0;

function createNavBar() {
    const navBar = document.getElementById("navBar");
    navBar.innerHTML = "";
    for(let i=0; i<questions.length; i++) {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerText = i + 1;
        div.onclick = () => openModal(i);
        navBar.appendChild(div);
    }
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "Questão " + (idx + 1);
    let resp = q.type === "mc" ? q.a[q.correct] : q.answer;
    document.getElementById("modal-body").innerHTML = `<strong>Pergunta:</strong><p>${q.q}</p><hr><strong>Resposta Oficial:</strong><p style="color: #0b1e3d; font-weight:bold; background: #f0f0f0; padding: 10px; border-radius:5px;">${resp}</p>`;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

function start(){
    shuffled=[...questions];
    for(let i=shuffled.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    createNavBar();
    show();
}

function show(){
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("result").innerText="";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("progress").innerText="Questão "+(current+1)+" de "+shuffled.length;
    let q=shuffled[current];
    document.getElementById("question").innerText=q.q;
    document.getElementById("options").innerHTML="";
    document.getElementById("discursive").innerHTML="";

    if(q.type==="mc"){
        let opts = [...q.a];
        let corTxt = q.a[q.correct];
        opts.sort(() => Math.random() - 0.5);
        opts.forEach(opt => {
            let d = document.createElement("div"); d.className="option"; d.innerText=opt;
            d.onclick=() => {
                document.querySelectorAll(".option").forEach(o=>o.onclick=null);
                if(opt === corTxt){ d.classList.add("correct"); score++; }
                else { d.classList.add("wrong"); document.querySelectorAll(".option").forEach(o=>{if(o.innerText===corTxt)o.classList.add("correct")}); }
                document.getElementById("nextBtn").style.display="inline-block";
            };
            document.getElementById("options").appendChild(d);
        });
    } else {
        let inp = document.createElement("input"); inp.id="userInp"; inp.placeholder="Digite sua resposta e compare...";
        let b = document.createElement("button"); b.innerText="Ver Resposta Oficial";
        b.onclick=() => {
            document.getElementById("feedback").innerHTML = `<div id="feedback-area"><strong>Resposta do PDF:</strong><br><span style="color:#4da6ff; font-weight:bold;">${q.answer}</span></div>`;
            document.getElementById("nextBtn").style.display="inline-block";
        };
        document.getElementById("discursive").appendChild(inp); document.getElementById("discursive").appendChild(b);
    }
}

function nextQuestion(){ current++; if(current < shuffled.length) show(); else finish(); }

function finish(){
    document.getElementById("mainBox").innerHTML = `<h2>Simulado Concluído!</h2><p>Acertos nas questões objetivas: ${score}</p><button onclick="location.reload()">Reiniciar</button>`;
}

start();
</script>
</body>
</html>
