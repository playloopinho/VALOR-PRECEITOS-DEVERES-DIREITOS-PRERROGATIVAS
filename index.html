<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administração Naval - Completo Oficial</title>

<style>
body{
    font-family: Arial;
    background:#0b1e3d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.container{
    width:95%;
    max-width:850px;
    text-align:center;
}

.box{
    background:#132b52;
    padding:20px;
    border-radius:10px;
}

.option{
    background:#4da6ff;
    color:black;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.correct{background:green !important;color:white;}
.wrong{background:red !important;color:white;}

input{
    width:90%;
    padding:8px;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<div class="box">
<div id="progress"></div>
<h3 id="question"></h3>
<div id="options"></div>
<div id="discursive"></div>
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima</button>
<h3 id="result"></h3>
</div>
</div>

<script>

const questions = [

/* ================= 26 OBJETIVAS ================= */

{type:"mc",q:"Documento utilizado para registro de dependentes junto à DPMM e CPesFN?",
a:["Declaração de Dependente (DD)","Portaria","Ficha Militar","Termo"],correct:0},

{type:"mc",q:"Órgão de Direção Setorial relacionado à economia e administração naval?",
a:["Secretaria-Geral da Marinha (SGM)","Comando Naval","Diretoria Militar","Conselho"],correct:0},

{type:"mc",q:"Documento que registra anexação à Sindicância?",
a:["Juntada","Autuação","IPM","Portaria"],correct:0},

{type:"mc",q:"Termo inicial da Sindicância?",
a:["Autuação","Juntada","Relatório","Depoimento"],correct:0},

{type:"mc",q:"Promoção baseada no conjunto de qualidades?",
a:["Promoção por merecimento","Automática","Especial","Administrativa"],correct:0},

{type:"mc",q:"Promoção baseada na precedência hierárquica?",
a:["Promoção por antiguidade","Bravura","Post-mortem","Especial"],correct:0},

{type:"mc",q:"Promoção por ato de coragem?",
a:["Promoção por bravura","Antiguidade","Tempo","Administrativa"],correct:0},

{type:"mc",q:"Promoção após falecimento?",
a:["Promoção post-mortem","Honorária","Administrativa","Automática"],correct:0},

{type:"mc",q:"Procedimento administrativo sumário preliminar?",
a:["Sindicância","IPM","Conselho","Auditoria"],correct:0},

{type:"mc",q:"Procedimento para apuração de crimes militares?",
a:["Inquérito Policial Militar (IPM)","Sindicância","Processo Civil","Portaria"],correct:0},

{type:"mc",q:"Estágio de complementação prática após cursos?",
a:["Estágio de Aplicação","Curso Especial","Treinamento","Inicial"],correct:0},

{type:"mc",q:"Crime por ausência superior a 8 dias?",
a:["Deserção","Indisciplina","Contravenção","Abandono"],correct:0},

{type:"mc",q:"Promoção após reconhecimento de direito não efetivado?",
a:["Ressarcimento de preterição","Especial","Automática","Administrativa"],correct:0},

{type:"mc",q:"Documento de compromisso do escrivão?",
a:["Termo de Compromisso","Portaria","Autuação","Juntada"],correct:0},

{type:"mc",q:"Conceito de Contravenção Disciplinar?",
a:["Ação ou omissão contrária aos deveres que não seja crime","Crime","Advertência","Suspensão"],correct:0},

{type:"mc",q:"Principal missão da Guarda a Presos?",
a:["Manter controle e custódia","Julgar","Aplicar pena","Interrogar"],correct:0},

{type:"mc",q:"Compromissos de tempo de serviço são:",
a:["Inicial, prorrogações e cursos","Somente inicial","Somente cursos","Somente prorrogação"],correct:0},

{type:"mc",q:"Não se deve usar Bandeira Nacional como:",
a:["Reposteiro ou pano de boca","Símbolo","Honra","Cerimônia"],correct:0},

{type:"mc",q:"Circunstância atenuante disciplinar?",
a:["Bons antecedentes militares","Reincidência","Deserção","Crime"],correct:0},

{type:"mc",q:"Quando pode tocar no preso?",
a:["Legítima defesa ou evitar fuga","Sempre","Nunca","Por ordem verbal"],correct:0},

{type:"mc",q:"Dever das Praças?",
a:["Cumprir instruções e executar serviço","Recusar ordens","Evitar exercícios","Dispensar tarefas"],correct:0},

/* ================= 17 DO PDF ================= */

/* Objetivas */

{type:"mc",q:"São deveres específicos de todas as Praças, EXCETO:",
a:["Cumprir instruções","Executar manutenção","Tomar parte em exercícios","Participar de cultura física"],correct:3},

{type:"mc",q:"Qual NÃO é considerada Licença?",
a:["Licença para frequentar curso de formação pessoal (LECEP)","Licença à adotante","Licença paternidade","Licença saúde familiar"],correct:0},

{type:"mc",q:"Qual NÃO caracteriza Crime de Deserção?",
a:["Evadir-se do poder de escolta","Ausentar-se por mais de oito dias","Não retornar de férias","Não retornar de licença"],correct:0},

{type:"mc",q:"Órgão de assistência direta do Ministério da Defesa?",
a:["Assessoria Especial Militar","Hospital das FFAA","ESG","Programa Calha Norte"],correct:0},

/* Discursivas */

{type:"text",q:"Escreva: Como são classificados os compromissos de tempo de serviço?",
answer:"compromisso inicial; compromissos decorrentes das prorrogações do tempo de serviço; compromissos de cursos ou estágios"},

{type:"text",q:"Conceitue Contravenção Disciplinar.",
answer:"ação ou omissão contrária às obrigações ou deveres militares que não constitua crime"},

{type:"text",q:"Procedimento destinado à apuração de crimes militares e autoria?",
answer:"inquérito policial militar"},

{type:"text",q:"Termo inicial da Sindicância subscrito pelo escrivão?",
answer:"autuação"},

{type:"text",q:"Escrivão designado na ausência é chamado?",
answer:"escrivão ad hoc"},

{type:"text",q:"Ofendido na sindicância é ouvido em?",
answer:"termo de inquirição"},

{type:"text",q:"Data em que é lavrada Parte de Deserção após 8 dias de ausência?",
answer:"15 de março de 2024"}

];

let shuffled=[];
let current=0;
let score=0;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
}

function start(){
shuffled=[...questions];
shuffle(shuffled);
current=0;
score=0;
show();
}

function show(){
document.getElementById("nextBtn").style.display="none";
document.getElementById("result").innerText="";
document.getElementById("progress").innerText="Questão "+(current+1)+" de "+shuffled.length;

let q=shuffled[current];
document.getElementById("question").innerText=q.q;
document.getElementById("options").innerHTML="";
document.getElementById("discursive").innerHTML="";

if(q.type==="mc"){
let answers=[...q.a];
shuffle(answers);
answers.forEach(ans=>{
let div=document.createElement("div");
div.className="option";
div.innerText=ans;
div.onclick=()=>select(div,ans,q.a[q.correct]);
document.getElementById("options").appendChild(div);
});
}else{
let input=document.createElement("input");
input.id="textAnswer";
let btn=document.createElement("button");
btn.innerText="Responder";
btn.onclick=()=>checkText(q.answer);
document.getElementById("discursive").appendChild(input);
document.getElementById("discursive").appendChild(btn);
}
}

function select(el,sel,cor){
let opts=document.querySelectorAll(".option");
opts.forEach(o=>o.onclick=null);

if(sel===cor){
el.classList.add("correct");
score++;
}else{
el.classList.add("wrong");
opts.forEach(o=>{if(o.innerText===cor){o.classList.add("correct");}});
}

document.getElementById("nextBtn").style.display="inline-block";
}

function checkText(correct){
let val=document.getElementById("textAnswer").value.toLowerCase().trim();

if(val.includes(correct.substring(0,10))){
score++;
document.getElementById("result").innerText="✅ Correto!";
}else{
document.getElementById("result").innerText="❌ Resposta correta: "+correct;
}

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
current++;
if(current<shuffled.length){
show();
}else{
let percent=Math.round((score/shuffled.length)*100);
document.getElementById("question").innerText="SIMULADO FINALIZADO";
document.getElementById("options").innerHTML="";
document.getElementById("discursive").innerHTML="";
document.getElementById("progress").innerText="";
document.getElementById("result").innerText=
"Resultado Final: "+score+" de "+shuffled.length+" | "+percent+"%";
document.getElementById("nextBtn").style.display="none";
}
}

start();

</script>
</body>
</html>
